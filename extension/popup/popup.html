<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600">
  <title>Correlation ID Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1>Correlation ID Tracker</h1>
    <div class="header-actions">
      <button id="btnRefresh" title="Refresh">&#x21bb;</button>
      <button id="btnAutoScan" title="Open order sections and scan page data">Auto Scan</button>
      <button id="btnOpenDashboard" title="Open order flow in a tab">Open</button>
      <button id="btnOptions" title="Open options">&#9881;</button>
      <button id="btnClear" title="Clear all logs">&#x1f5d1;</button>
      <button id="btnGenerateReport" title="Generate report">Report</button>
      <button id="btnExportJson" title="Export JSON">JSON</button>
      <button id="btnExportCsv" title="Export CSV">CSV</button>
    </div>
  </header>

  <main>
    <section class="automation-panel" aria-label="Order automation">
      <div class="automation-grid">
        <label>
          SKU
          <input id="automationSku" type="text" autocomplete="off" spellcheck="false" placeholder="Enter SKU">
        </label>
        <label>
          Customer
          <input id="automationCustomer" type="text" autocomplete="off" spellcheck="false" placeholder="Enter customer">
        </label>
        <button id="btnRunOrderFlow" title="Search SKU, add cart, select customer, and schedule delivery">Run Flow</button>
      </div>
    </section>

    <section class="flow-panel" aria-label="Order flow capture">
      <div class="flow-header">
        <div>
          <h2>Order Flow</h2>
          <p id="flowStatus">Clear, run the order, then review the stitched row.</p>
        </div>
        <div class="flow-actions">
          <button id="btnGenerateFlow">Copy Flow</button>
        </div>
      </div>
      <div class="flow-table-wrap">
        <table class="flow-table">
          <thead>
            <tr>
              <th>Select</th>
              <th>Timestamp</th>
              <th>Order Tracking ID</th>
              <th>Quote</th>
              <th>SKU</th>
              <th>Customer</th>
              <th>Address</th>
              <th>Delivery</th>
              <th>Sourcing Corr</th>
              <th>Capacity Corr</th>
              <th>Reserve Corr</th>
            </tr>
          </thead>
          <tbody id="orderFlowBody"></tbody>
        </table>
      </div>
      <p id="orderFlowEmpty" class="flow-empty">No stitched order flow yet.</p>
    </section>

    <section id="reportPanel" class="report-panel" hidden>
      <div class="report-header">
        <div>
          <h2>Generated report</h2>
          <p id="reportMeta">Uses all captured events.</p>
        </div>
        <div class="report-actions">
          <button id="btnCopyReport">Copy Report</button>
          <button id="btnEmailReport">Send Email Draft</button>
          <button id="btnCloseReport" title="Close report">Close</button>
        </div>
      </div>
      <textarea id="reportPreview" rows="12" readonly spellcheck="false"></textarea>
    </section>

  </main>

  <footer class="footer">
    <span id="statusText">Ready</span>
    <span id="statsText"></span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>

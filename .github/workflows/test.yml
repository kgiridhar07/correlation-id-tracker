name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  browser-tests:
    name: Browser unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Validate manifest JSON
        shell: bash
        run: |
          python3 -m json.tool extension/manifest.json > /tmp/manifest.json

      - name: Start local test server
        shell: bash
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/correlation-tracker-http.log 2>&1 &
          echo "$!" > /tmp/correlation-tracker-http.pid

      - name: Run extension browser tests
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            if curl --silent --fail http://127.0.0.1:4173/extension/tests/test-runner.html > /dev/null; then
              break
            fi
            sleep 0.25
          done

          chrome --headless --disable-gpu --no-sandbox --virtual-time-budget=10000 --dump-dom \
            http://127.0.0.1:4173/extension/tests/test-runner.html > /tmp/correlation-tracker-test-dom.html

          cat /tmp/correlation-tracker-test-dom.html
          grep -q 'data-tests-done="true"' /tmp/correlation-tracker-test-dom.html
          grep -q '18 passed, 0 failed' /tmp/correlation-tracker-test-dom.html
          grep -q 'PASS - builds one order flow row from page values and network milestones' /tmp/correlation-tracker-test-dom.html
          grep -q 'PASS - keeps previous order flow rows when another flow is captured' /tmp/correlation-tracker-test-dom.html
          grep -q 'PASS - persists captured order flow events without dropping previous rows' /tmp/correlation-tracker-test-dom.html

      - name: Stop local test server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/correlation-tracker-http.pid ]; then
            kill "$(cat /tmp/correlation-tracker-http.pid)" || true
          fi